<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkmate Hoops: Royal Oak Rumble</title>
<style>
  :root {
    --bg: #07151d;
    --panel: #122b39;
    --accent: #ffb23f;
    --text: #f7f4dc;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 20% 20%, #18384a 0 18%, transparent 19%),
      radial-gradient(circle at 80% 80%, #3a1c12 0 18%, transparent 19%),
      var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .wrap {
    width: min(96vw, 780px);
    display: grid;
    gap: 12px;
    justify-items: center;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.35rem, 3vw, 2rem);
    letter-spacing: 0.03em;
    text-align: center;
  }

  .game-shell {
    width: min(96vw, 672px);
    padding: 12px;
    border: 4px solid #31495c;
    border-radius: 16px;
    background: linear-gradient(180deg, #17384a, #07151d);
    box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
  }

  canvas {
    display: block;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 4 / 3;
    margin: auto;
    border: 3px solid #f7f4dc;
    border-radius: 8px;
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    width: min(96vw, 672px);
    font-size: 0.95rem;
  }

  .card {
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 10px;
    background: rgba(18, 43, 57, 0.82);
  }

  kbd {
    display: inline-block;
    min-width: 1.75em;
    padding: 2px 6px;
    margin: 0 2px;
    border-radius: 5px;
    background: #f7f4dc;
    color: #07151d;
    font-weight: 800;
    text-align: center;
  }

  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>Checkmate Hoops: Royal Oak Rumble</h1>
    <section class="game-shell">
      <canvas id="game" width="160" height="120" aria-label="Checkmate Hoops game canvas"></canvas>
    </section>
    <section class="controls">
      <div class="card"><strong>Move:</strong> <kbd>Arrow Keys</kbd> choose a legal square, then <kbd>Enter</kbd> or <kbd>Space</kbd>.</div>
      <div class="card"><strong>Shoot:</strong> aim with <kbd>Up</kbd>/<kbd>Down</kbd>, hold <kbd>Space</kbd> to charge, release to shoot. <kbd>R</kbd> restarts.</div>
    </section>
  </main>
